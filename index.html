  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; background: #F6F2E9; color: #22352E; font-family: 'Mulish', sans-serif; }\n  a { color: #2F6D5B; }\n  a:hover { color: #E4772E; }\n  input, button { font: inherit; }\n  input:focus { outline: none; border-color: #2F6D5B !important; }\n  ::placeholder { color: #a6a08e; }\n  html { scroll-behavior: smooth; }\n  h1, h2, h3 { text-wrap: balance; }\n  p { text-wrap: pretty; }\n  img { max-width: 100%; }\n  @media (max-width: 820px) {\n    .wrap { padding: 0 18px !important; }\n    .nav-links { display: none !important; }\n    .site-header { flex-wrap: wrap !important; row-gap: 12px !important; }\n    .hero { grid-template-columns: 1fr !important; gap: 28px !important; padding: 24px 0 36px !important; }\n    .hero h1 { font-size: 36px !important; }\n    .hero p { font-size: 17px !important; max-width: none !important; }\n    .rg3, .rg4, .rg2, .need-outer, .need-inner { grid-template-columns: 1fr !important; }\n    .pad-box { padding: 30px 22px !important; }\n    .what-box { padding: 26px 22px !important; }\n    .what-box p { font-size: 19px !important; }\n    .req-form-side { padding: 22px !important; }\n    .sec { padding: 18px 0 28px !important; }\n    h2.big { font-size: 26px !important; }\n    .dl-menu { width: min(84vw, 310px) !important; }\n  }\n  html.sc-dc-streaming .dl-menu { display: none !important; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"wrap\" style=\"max-width:1120px; margin:0 auto; padding:0 28px;\">\n\n  <!-- HEADER -->\n  <header class=\"site-header\" style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; padding:22px 0; position:relative;\">\n    <a href=\"#top\" style=\"display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit;\">\n      <img src=\"a1e91353-437d-4ce8-bfd3-60e91f4f79f5\" alt=\"RA Walks Notifier — Ramblers Tools\" style=\"height:64px; display:block;\">\n    <\u002Fa>\n    <nav style=\"display:flex; align-items:center; gap:8px; font-size:14.5px; font-weight:600; color:#4a5c53;\">\n      <a href=\"#what\" class=\"nav-links\" style=\"text-decoration:none; color:inherit; padding:9px 12px;\">What it is<\u002Fa>\n      <a href=\"#how\" class=\"nav-links\" style=\"text-decoration:none; color:inherit; padding:9px 12px;\">How it works<\u002Fa>\n      <a href=\"#faq\" class=\"nav-links\" style=\"text-decoration:none; color:inherit; padding:9px 12px;\">FAQ<\u002Fa>\n      <div style=\"position:relative;\">\n        <button sc-camel-on-click=\"{{ toggleMenu }}\" style=\"display:inline-flex; align-items:center; gap:7px; background:#EEE7D6; border:1px solid #e0d8c4; color:#3f5149; font-weight:700; font-size:14px; padding:9px 15px; border-radius:999px; cursor:pointer;\">Already a user? Download <span style=\"font-size:11px;\">▾<\u002Fspan><\u002Fbutton>\n        <sc-if value=\"{{ menuOpen }}\">\n          <div class=\"dl-menu\" style=\"position:absolute; right:0; top:calc(100% + 10px); width:310px; background:#fff; border:1px solid #ece5d6; border-radius:16px; box-shadow:0 24px 50px -22px rgba(30,58,50,0.55); padding:20px; z-index:20;\">\n            <sc-if value=\"{{ supported }}\" hint-placeholder-val=\"{{ true }}\">\n              <div>\n                <div style=\"font-size:12px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#9a8f78;\">Your device<\u002Fdiv>\n                <div style=\"font-family:'Bitter',serif; font-weight:600; font-size:19px; margin:6px 0 2px;\">Download for {{ osName }}<\u002Fdiv>\n                <div style=\"font-size:13.5px; color:#7a7364; margin-bottom:16px;\">{{ osSub }}<\u002Fdiv>\n                <a href=\"{{ releases }}\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"display:block; text-align:center; background:#E4772E; color:#fff; text-decoration:none; font-weight:700; font-size:15px; padding:12px; border-radius:10px;\">Get the {{ osName }} version<\u002Fa>\n                <a href=\"{{ all }}\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"display:block; text-align:center; color:#2F6D5B; text-decoration:none; font-weight:600; font-size:13.5px; margin-top:12px;\">Other systems &amp; all releases →<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ notSupported }}\" hint-placeholder-val=\"{{ false }}\">\n              <div>\n                <div style=\"font-family:'Bitter',serif; font-weight:600; font-size:18px; margin:0 0 8px;\">Not available on this device<\u002Fdiv>\n                <p style=\"font-size:14px; line-height:1.55; color:#6a6355; margin:0 0 14px;\">The desktop app runs on macOS (Apple&nbsp;silicon), Windows (64-bit) and Linux (64-bit). Open this page on one of those to download — or just request access above and skip the app entirely.<\u002Fp>\n                <a href=\"{{ all }}\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"display:block; text-align:center; border:1.5px solid #d9d1bf; color:#2F6D5B; text-decoration:none; font-weight:700; font-size:14px; padding:11px; border-radius:10px;\">See all downloads<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <a href=\"#request\" style=\"text-decoration:none; background:#22352E; color:#F6F2E9; padding:10px 18px; border-radius:999px; margin-left:4px;\">Request access<\u002Fa>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section id=\"top\" class=\"hero\" style=\"display:grid; grid-template-columns:1.05fr 0.95fr; gap:44px; padding:44px 0 56px; align-items:center;\">\n    <div>\n      <div style=\"display:inline-flex; align-items:center; gap:8px; background:#EAE0CB; color:#8A5A22; font-weight:700; font-size:12.5px; letter-spacing:0.08em; text-transform:uppercase; padding:7px 13px; border-radius:999px;\">For walk coordinators<\u002Fdiv>\n      <h1 style=\"font-family:'Bitter',serif; font-weight:800; font-size:54px; line-height:1.05; letter-spacing:-0.015em; margin:20px 0 0;\">Never miss a walk waiting to be&nbsp;reviewed.<\u002Fh1>\n      <p style=\"font-size:19px; line-height:1.55; color:#4a5c53; margin:22px 0 0; max-width:36ch;\">RA Walks Notifier keeps an eye on your group’s Walks Manager review queue and emails the right people the moment a walk needs checking. Access is by request — tell us about your group and we’ll set you up.<\u002Fp>\n      <div style=\"display:flex; gap:14px; margin-top:32px; align-items:center; flex-wrap:wrap;\">\n        <a href=\"#request\" style=\"background:#E4772E; color:#fff; text-decoration:none; font-weight:700; font-size:16px; padding:15px 28px; border-radius:12px; box-shadow:0 10px 24px -10px rgba(228,119,46,0.8);\">Request access for your group<\u002Fa>\n        <a href=\"#how\" style=\"text-decoration:none; font-weight:700; font-size:16px; color:#2F6D5B;\">See how it works →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:16px; overflow:hidden; box-shadow:0 34px 70px -34px rgba(30,58,50,0.55);\">\n      <img src=\"5af9d980-9708-48aa-9a8d-edf48eff09e3\" alt=\"Example notification email: RA Walks Notifier found a new walk to review\" style=\"width:100%; display:block; border-radius:16px;\">\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHAT IT IS -->\n  <section id=\"what\" class=\"sec\" style=\"padding:16px 0 40px;\">\n    <div class=\"what-box\" style=\"background:#fff; border:1px solid #ece5d6; border-radius:20px; padding:36px 48px; text-align:center;\">\n      <div style=\"font-family:'Bitter',serif; font-weight:600; font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:#9a8f78;\">What it is<\u002Fdiv>\n      <p style=\"font-family:'Bitter',serif; font-weight:400; font-size:23px; line-height:1.45; color:#2b3f37; margin:14px auto 0; max-width:62ch;\">A monitoring service for walk coordinators. It runs on our server, watching your group’s Walks Manager review queue and emailing the right people when walks are waiting. You only need the desktop app to set it up the first time and to change settings later — it doesn’t have to stay open. Access is by request.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHY IT HELPS -->\n  <section id=\"why\" class=\"sec\" style=\"padding:24px 0 40px;\">\n    <div style=\"font-family:'Bitter',serif; font-weight:600; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; color:#9a8f78;\">Why it helps your group<\u002Fdiv>\n    <div class=\"rg3\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:20px;\">\n      <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:16px; padding:28px;\">\n        <div style=\"width:42px; height:42px; border-radius:11px; background:#EAF1EC; display:flex; align-items:center; justify-content:center; font-size:20px; color:#2F6D5B;\">✓<\u002Fdiv>\n        <h3 style=\"font-family:'Bitter',serif; font-size:20px; margin:16px 0 8px;\">Nothing gets missed<\u002Fh3>\n        <p style=\"font-size:15px; line-height:1.55; color:#5a685f; margin:0;\">Pending walks are easy to forget. You get a friendly email nudge instead of a nasty surprise close to the deadline.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:16px; padding:28px;\">\n        <div style=\"width:42px; height:42px; border-radius:11px; background:#FBEEDF; display:flex; align-items:center; justify-content:center; font-size:20px; color:#C06A1F;\">☾<\u002Fdiv>\n        <h3 style=\"font-family:'Bitter',serif; font-size:20px; margin:16px 0 8px;\">No new habits<\u002Fh3>\n        <p style=\"font-size:15px; line-height:1.55; color:#5a685f; margin:0;\">The checks run on our server, so there’s nothing to keep open and no dashboard to remember to check.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:16px; padding:28px;\">\n        <div style=\"width:42px; height:42px; border-radius:11px; background:#EAF1EC; display:flex; align-items:center; justify-content:center; font-size:20px; color:#2F6D5B;\">◎<\u002Fdiv>\n        <h3 style=\"font-family:'Bitter',serif; font-size:20px; margin:16px 0 8px;\">Share the load<\u002Fh3>\n        <p style=\"font-size:15px; line-height:1.55; color:#5a685f; margin:0;\">Notify everyone who helps review walks — not just the one person who happens to log in that week.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW IT WORKS -->\n  <section id=\"how\" class=\"sec\" style=\"padding:24px 0 40px;\">\n    <div class=\"pad-box\" style=\"background:#22352E; color:#F6F2E9; border-radius:20px; padding:48px 44px;\">\n      <div style=\"font-family:'Bitter',serif; font-weight:600; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; color:#8fae9f;\">Getting started<\u002Fdiv>\n      <h2 class=\"big\" style=\"font-family:'Bitter',serif; font-weight:800; font-size:32px; line-height:1.15; margin:12px 0 0; max-width:24ch;\">From request to your first notification.<\u002Fh2>\n      <div class=\"rg4\" style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:24px; margin-top:36px;\">\n        <div>\n          <div style=\"font-family:'Bitter',serif; font-weight:800; font-size:15px; color:#E4772E;\">Step 1<\u002Fdiv>\n          <h3 style=\"font-family:'Bitter',serif; font-size:19px; margin:8px 0 8px;\">Request access<\u002Fh3>\n          <p style=\"font-size:14.5px; line-height:1.6; color:#c7d2cb; margin:0;\">Tell us about your group using the form below and we’ll set you up with access.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Bitter',serif; font-weight:800; font-size:15px; color:#E4772E;\">Step 2<\u002Fdiv>\n          <h3 style=\"font-family:'Bitter',serif; font-size:19px; margin:8px 0 8px;\">Set up once with the app<\u002Fh3>\n          <p style=\"font-size:14.5px; line-height:1.6; color:#c7d2cb; margin:0;\">Download RA Walks Notifier for macOS, Windows or Linux and run it to configure your group.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Bitter',serif; font-weight:800; font-size:15px; color:#E4772E;\">Step 3<\u002Fdiv>\n          <h3 style=\"font-family:'Bitter',serif; font-size:19px; margin:8px 0 8px;\">Choose your recipients<\u002Fh3>\n          <p style=\"font-size:14.5px; line-height:1.6; color:#c7d2cb; margin:0;\">Sign in, pick your group, and add who should be notified — then you can close the app.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Bitter',serif; font-weight:800; font-size:15px; color:#E4772E;\">Step 4<\u002Fdiv>\n          <h3 style=\"font-family:'Bitter',serif; font-size:19px; margin:8px 0 8px;\">The server does the rest<\u002Fh3>\n          <p style=\"font-size:14.5px; line-height:1.6; color:#c7d2cb; margin:0;\">From then on our server checks Walks Manager on a schedule and emails your reviewers when walks are pending.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHAT YOU'LL NEED -->\n  <section class=\"sec\" style=\"padding:24px 0 40px;\">\n    <div class=\"need-outer\" style=\"display:grid; grid-template-columns:0.8fr 1.2fr; gap:40px; align-items:center;\">\n      <div>\n        <div style=\"font-family:'Bitter',serif; font-weight:600; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; color:#9a8f78;\">Before you request<\u002Fdiv>\n        <h2 class=\"big\" style=\"font-family:'Bitter',serif; font-weight:800; font-size:30px; line-height:1.15; margin:12px 0 0;\">A few things to have handy<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.6; color:#5a685f; margin:14px 0 0;\">Nothing technical — just enough for us to set your group up with access.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"need-inner\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n        <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:14px; padding:22px;\"><div style=\"font-family:'Bitter',serif; font-size:17px; font-weight:600;\">Your group’s name<\u002Fdiv><p style=\"font-size:14px; color:#6a7369; margin:6px 0 0; line-height:1.5;\">So we know which group to set up.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:14px; padding:22px;\"><div style=\"font-family:'Bitter',serif; font-size:17px; font-weight:600;\">A contact email<\u002Fdiv><p style=\"font-size:14px; color:#6a7369; margin:6px 0 0; line-height:1.5;\">Someone we can reach to arrange access.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:14px; padding:22px;\"><div style=\"font-family:'Bitter',serif; font-size:17px; font-weight:600;\">Walks Manager access<\u002Fdiv><p style=\"font-size:14px; color:#6a7369; margin:6px 0 0; line-height:1.5;\">Your group already reviews its walks there.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SCREENSHOTS -->\n  <section class=\"sec\" style=\"padding:24px 0 40px;\">\n    <div style=\"font-family:'Bitter',serif; font-weight:600; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; color:#9a8f78;\">A look at the app<\u002Fdiv>\n    <p style=\"font-size:16px; line-height:1.6; color:#5a685f; margin:10px 0 24px; max-width:52ch;\">Here’s what you’ll see in the app when you set up your group or change settings.<\u002Fp>\n    <div class=\"rg3\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:22px; align-items:start;\">\n      <figure style=\"margin:0;\"><div style=\"background:#fff; border:1px solid #e2dccb; border-radius:14px; overflow:hidden; box-shadow:0 18px 40px -26px rgba(30,58,50,0.5);\"><img src=\"7aa08cc3-7f5f-47c2-ad7f-f6503034eff4\" alt=\"Server connection and Walks Manager login\" style=\"width:100%; display:block;\"><\u002Fdiv><figcaption style=\"font-size:14px; color:#6a7369; margin-top:10px; text-align:center;\">Connect &amp; sign in<\u002Ffigcaption><\u002Ffigure>\n      <figure style=\"margin:0;\"><div style=\"background:#fff; border:1px solid #e2dccb; border-radius:14px; overflow:hidden; box-shadow:0 18px 40px -26px rgba(30,58,50,0.5);\"><img src=\"a36946ea-61d5-4a75-b1d7-582052373975\" alt=\"Group selection and notification recipients\" style=\"width:100%; display:block;\"><\u002Fdiv><figcaption style=\"font-size:14px; color:#6a7369; margin-top:10px; text-align:center;\">Choose group &amp; recipients<\u002Ffigcaption><\u002Ffigure>\n      <figure style=\"margin:0;\"><div style=\"background:#fff; border:1px solid #e2dccb; border-radius:14px; overflow:hidden; box-shadow:0 18px 40px -26px rgba(30,58,50,0.5);\"><img src=\"15a091e0-ffa8-4788-a135-dc12940a9dc0\" alt=\"Status window showing pending walks, schedule and recipients\" style=\"width:100%; display:block;\"><\u002Fdiv><figcaption style=\"font-size:14px; color:#6a7369; margin-top:10px; text-align:center;\">Status at a glance<\u002Ffigcaption><\u002Ffigure>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section id=\"faq\" class=\"sec\" style=\"padding:24px 0 40px;\">\n    <div style=\"font-family:'Bitter',serif; font-weight:600; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; color:#9a8f78;\">Questions<\u002Fdiv>\n    <div class=\"rg2\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:20px;\">\n      <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:14px; padding:26px;\"><h3 style=\"font-family:'Bitter',serif; font-size:19px; margin:0 0 8px;\">Is it secure?<\u002Fh3><p style=\"font-size:15px; line-height:1.55; color:#5a685f; margin:0;\">Yes. Your connection details are used only to check your own group’s queue, and we don’t share them with anyone.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:14px; padding:26px;\"><h3 style=\"font-family:'Bitter',serif; font-size:19px; margin:0 0 8px;\">Does it cost anything?<\u002Fh3><p style=\"font-size:15px; line-height:1.55; color:#5a685f; margin:0;\">No — it’s free for Ramblers groups.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:14px; padding:26px;\"><h3 style=\"font-family:'Bitter',serif; font-size:19px; margin:0 0 8px;\">Which groups can use it?<\u002Fh3><p style=\"font-size:15px; line-height:1.55; color:#5a685f; margin:0;\">Any Ramblers group that uses Walks Manager to review its walks.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ece5d6; border-radius:14px; padding:26px;\"><h3 style=\"font-family:'Bitter',serif; font-size:19px; margin:0 0 8px;\">Do I need to keep the app running?<\u002Fh3><p style=\"font-size:15px; line-height:1.55; color:#5a685f; margin:0;\">No. The checks run on our server. You only use the desktop app to set things up the first time and whenever you change settings — after that you can close it.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- REQUEST FORM -->\n  <section id=\"request\" class=\"sec\" style=\"padding:24px 0 56px;\">\n    <div class=\"pad-box\" style=\"background:#22352E; color:#F6F2E9; border-radius:22px; padding:52px 44px;\">\n      <div class=\"rg2\" style=\"display:grid; grid-template-columns:0.9fr 1.1fr; gap:48px; align-items:center;\">\n        <div>\n          <h2 style=\"font-family:'Bitter',serif; font-weight:800; font-size:36px; line-height:1.1; margin:0;\">Request access for your&nbsp;group<\u002Fh2>\n          <p style=\"font-size:16.5px; line-height:1.6; color:#c7d2cb; margin:16px 0 0;\">Tell us a little about your group and we’ll be in touch to get you set up. Free for Ramblers groups — we’ll only use your details to arrange access.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"req-form-side\" style=\"background:#F6F2E9; border-radius:18px; padding:30px;\">\n          <sc-if value=\"{{ notDone }}\" hint-placeholder-val=\"{{ true }}\">\n            <form sc-camel-on-submit=\"{{ submit }}\" style=\"display:flex; flex-direction:column; gap:16px;\">\n              <label style=\"display:flex; flex-direction:column; gap:7px; color:#22352E; font-weight:700; font-size:14px;\">Your name\n                <input value=\"{{ nameVal }}\" sc-camel-on-input=\"{{ onName }}\" placeholder=\"Jane Walker\" style=\"border:1.5px solid #d9d1bf; background:#fff; border-radius:10px; padding:13px 15px; font-size:15.5px; color:#22352E;\"><\u002Flabel>\n              <label style=\"display:flex; flex-direction:column; gap:7px; color:#22352E; font-weight:700; font-size:14px;\">Group name\n                <input value=\"{{ groupVal }}\" sc-camel-on-input=\"{{ onGroup }}\" placeholder=\"East Cheshire Ramblers\" style=\"border:1.5px solid #d9d1bf; background:#fff; border-radius:10px; padding:13px 15px; font-size:15.5px; color:#22352E;\"><\u002Flabel>\n              <label style=\"display:flex; flex-direction:column; gap:7px; color:#22352E; font-weight:700; font-size:14px;\">Contact email\n                <input type=\"email\" value=\"{{ emailVal }}\" sc-camel-on-input=\"{{ onEmail }}\" placeholder=\"you@example.org\" style=\"border:1.5px solid #d9d1bf; background:#fff; border-radius:10px; padding:13px 15px; font-size:15.5px; color:#22352E;\"><\u002Flabel>\n              <sc-if value=\"{{ isError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#FBE3D6; color:#9A3D12; font-size:14px; font-weight:600; padding:11px 14px; border-radius:9px;\">{{ errMsg }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <button type=\"submit\" disabled=\"{{ isSending }}\" style=\"background:#E4772E; color:#fff; border:none; font-weight:700; font-size:16px; padding:15px; border-radius:11px; cursor:pointer; margin-top:4px; opacity:{{ sendOpacity }};\">{{ submitLabel }}<\u002Fbutton>\n              <p style=\"font-size:12.5px; color:#8a8271; margin:2px 0 0; text-align:center;\">We’ll reply to arrange setup. No spam, ever.<\u002Fp>\n            <\u002Fform>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center; padding:24px 8px;\">\n              <div style=\"width:56px; height:56px; border-radius:50%; background:#EAF1EC; color:#2F6D5B; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto;\">✓<\u002Fdiv>\n              <h3 style=\"font-family:'Bitter',serif; font-size:24px; color:#22352E; margin:18px 0 8px;\">Request sent<\u002Fh3>\n              <p style=\"font-size:15.5px; line-height:1.6; color:#5a685f; margin:0;\">Thanks — we’ve got your details and we’ll be in touch soon to get {{ groupNameDisplay }} set up.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid #e2dccb; padding:32px 0 48px; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;\">\n    <div style=\"display:flex; align-items:center; gap:12px;\">\n      <img src=\"8965894e-1e2b-4693-a9c5-055887edc149\" alt=\"Ramblers Tools\" style=\"height:40px; display:block;\">\n    <\u002Fdiv>\n    <div style=\"font-size:13.5px; color:#8a8271; display:flex; align-items:center; gap:18px; flex-wrap:wrap;\">\n      <span>RA Walks Notifier · part of Ramblers Tools<\u002Fspan>\n      <a href=\"https://github.com/Ramblers-Tools/ra_walks_notifier\" style=\"text-decoration:none; font-weight:600;\">GitHub<\u002Fa>\n      <a href=\"{{ releases }}\" style=\"text-decoration:none; font-weight:600;\">Latest release<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  // ── Where the request form POSTs. Paste your serverless proxy URL here\n  //    (e.g. a Cloudflare Worker) that holds the smtp2go API key server-side.\n  //    The page sends JSON { name, group, email } — the proxy sends the email.\n  FORM_ENDPOINT = \"https://little-mouse-a924.me-e89.workers.dev/\";\n\n  RELEASES = \"https://github.com/Ramblers-Tools/ra_walks_notifier/releases/latest\";\n  ALL = \"https://github.com/Ramblers-Tools/ra_walks_notifier/releases\";\n\n  state = { os: \"detecting\", menuOpen: false, name: \"\", group: \"\", email: \"\", status: \"idle\", errMsg: \"\" };\n\n  componentDidMount() {\n    this.setState({ os: this.detectOS() });\n    this._onDoc = (e) => { if (this.state.menuOpen) this.setState({ menuOpen: false }); };\n    // close menu on outside click (next tick so the toggle itself doesn't close it)\n    document.addEventListener(\"click\", this._docClose = (e) => {\n      if (!this.state.menuOpen) return;\n      if (e.target.closest && e.target.closest(\"[data-dl-menu]\")) return;\n      this.setState({ menuOpen: false });\n    });\n  }\n  componentWillUnmount() { if (this._docClose) document.removeEventListener(\"click\", this._docClose); }\n\n  detectOS() {\n    const ua = navigator.userAgent || \"\";\n    if (/Windows/i.test(ua)) return \"windows\";\n    if (/Android/i.test(ua)) return \"android\";\n    if (/iPhone|iPad|iPod/i.test(ua)) return \"ios\";\n    if (/Macintosh|Mac OS X/i.test(ua)) return \"mac\";\n    if (/Linux|X11/i.test(ua)) return \"linux\";\n    return \"other\";\n  }\n\n  submit = async (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    const name = this.state.name.trim(), group = this.state.group.trim(), email = this.state.email.trim();\n    if (!name || !group || !email) { this.setState({ status: \"error\", errMsg: \"Please fill in all three fields.\" }); return; }\n    if (!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(email)) { this.setState({ status: \"error\", errMsg: \"That email doesn’t look right — please check it.\" }); return; }\n    if (!this.FORM_ENDPOINT) {\n      // No proxy configured yet — treat as success in preview so the flow is visible.\n      this.setState({ status: \"done\" });\n      return;\n    }\n    this.setState({ status: \"sending\", errMsg: \"\" });\n    try {\n      const res = await fetch(this.FORM_ENDPOINT, {\n        method: \"POST\",\n        headers: { \"Content-Type\": \"application/json\" },\n        body: JSON.stringify({ name, group, email }),\n      });\n      const data = await res.json().catch(() => ({}));\n      if (!res.ok || !data.ok) throw new Error(data.error || \"\");\n      this.setState({ status: \"done\" });\n    } catch (err) {\n      const msg = (err && err.message) ? err.message : \"Sorry, that didn’t send. Please try again, or email us directly.\";\n      this.setState({ status: \"error\", errMsg: msg });\n    }\n  };\n\n  renderVals() {\n    const map = { mac: [\"macOS\", \"Apple silicon (.dmg)\"], windows: [\"Windows\", \"64-bit installer (.exe)\"], linux: [\"Linux\", \"64-bit (.AppImage)\"] };\n    const os = this.state.os;\n    const supported = !!map[os];\n    const st = this.state.status;\n    return {\n      menuOpen: this.state.menuOpen,\n      toggleMenu: (e) => { if (e) e.stopPropagation(); this.setState((s) => ({ menuOpen: !s.menuOpen })); },\n      closeMenu: () => this.setState({ menuOpen: false }),\n      supported,\n      notSupported: !supported,\n      osName: supported ? map[os][0] : \"\",\n      osSub: supported ? map[os][1] : \"\",\n      releases: this.RELEASES,\n      all: this.ALL,\n      nameVal: this.state.name,\n      groupVal: this.state.group,\n      groupNameDisplay: this.state.group.trim() || \"your group\",\n      emailVal: this.state.email,\n      onName: (e) => this.setState({ name: e.target.value }),\n      onGroup: (e) => this.setState({ group: e.target.value }),\n      onEmail: (e) => this.setState({ email: e.target.value }),\n      submit: this.submit,\n      isSending: st === \"sending\",\n      isError: st === \"error\",\n      isDone: st === \"done\",\n      notDone: st !== \"done\",\n      errMsg: this.state.errMsg,\n      submitLabel: st === \"sending\" ? \"Sending…\" : \"Send request\",\n      sendOpacity: st === \"sending\" ? 0.6 : 1,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
