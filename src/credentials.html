<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Upgrade to Auto Login</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      color: #1f2933;
      background: #f7f8fa;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    .hint {
      margin: 0 0 14px;
      color: #52606d;
      font-size: 12px;
      line-height: 1.4;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 12px;
    }

    label:first-of-type {
      margin-top: 0;
    }

    input[type="text"], input[type="password"] {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #b8c1cc;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      background: white;
      font-family: inherit;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      border: 1px solid #9aa5b1;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }

    button.primary {
      border-color: #f0814f;
      background: #f0814f;
      color: white;
    }

    button.primary:hover {
      border-color: #d96a3a;
      background: #d96a3a;
    }

    #close:hover {
      border-color: #b42318;
      background: #b42318;
      color: white;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    button.primary:disabled {
      border-color: #9aa5b1;
      background: #c1c8d1;
      color: #f2f4f6;
    }

    .message {
      min-height: 18px;
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.4;
      color: #52606d;
    }

    .message.ok { color: #1f7a3f; }
    .message.error { color: #b42318; }
    .message.pending { animation: pulse 1.2s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .close-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Upgrade to Auto Login</h1>
  <div class="hint" id="credentialsHint">
    We'll sign in and save your username and password (encrypted, server-side) so the server can automatically re-log-in when your Walks Manager session expires - normally about once a week. If this doesn't work, we'll fall back to a one-off browser login instead.
  </div>

  <label for="credUsername">Email address</label>
  <input id="credUsername" type="text" autocomplete="off">
  <label for="credPassword">Password</label>
  <input id="credPassword" type="password" autocomplete="off">

  <div class="actions">
    <button id="saveCredentials" class="primary">Verify &amp; Save</button>
  </div>
  <div id="credentialsMessage" class="message"></div>

  <div class="close-row">
    <button id="close">Close</button>
  </div>

  <script>
    function setMessage(el, text, kind) {
      el.textContent = text || '';
      el.className = `message ${kind || ''}`;
    }

    const credUsernameInput = document.getElementById('credUsername');
    const credPasswordInput = document.getElementById('credPassword');
    const credentialsHint = document.getElementById('credentialsHint');
    const credentialsMessage = document.getElementById('credentialsMessage');
    const saveCredentialsButton = document.getElementById('saveCredentials');
    const defaultHint = credentialsHint.textContent;

    window.credentialsUpgrade.status().then((status) => {
      if (status.credentialsSet) {
        credUsernameInput.value = status.username || '';
        credentialsHint.textContent = 'Credentials are saved for auto-relogin. Enter a password (and username, if it changed) to update them.';
      }
    });

    saveCredentialsButton.addEventListener('click', async () => {
      const username = credUsernameInput.value.trim();
      const password = credPasswordInput.value;
      if (!username || !password) {
        setMessage(credentialsMessage, 'Enter your Ramblers email address and password.', 'error');
        return;
      }
      saveCredentialsButton.disabled = true;
      setMessage(credentialsMessage, 'Verifying...', 'pending');
      try {
        const result = await window.credentialsUpgrade.save({ username, password });
        credPasswordInput.value = '';
        setMessage(credentialsMessage, result.message, result.status === 'saved' ? 'ok' : 'error');
        if (result.status === 'saved') {
          credentialsHint.textContent = defaultHint;
          setTimeout(() => window.close(), 1200);
        }
      } catch (error) {
        setMessage(credentialsMessage, error.message, 'error');
      } finally {
        saveCredentialsButton.disabled = false;
      }
    });

    document.getElementById('close').addEventListener('click', () => window.close());
  </script>
</body>
</html>
