<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>About RA Walks Notifier</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 28px 24px 20px;
      color: #1f2933;
      background: #f7f8fa;
      text-align: center;
    }

    img.logo {
      width: 200px;
      height: auto;
      margin-bottom: 18px;
    }

    p.detail {
      font-size: 13px;
      line-height: 1.6;
      margin: 4px 0;
      color: #3e4c59;
    }

    p.description {
      font-size: 12px;
      color: #616e7c;
      margin: 14px 0 20px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #b8c1cc;
      background: white;
      cursor: pointer;
    }

    button.primary {
      background: #1f2933;
      color: white;
      border-color: #1f2933;
    }
  </style>
</head>
<body>
  <img class="logo" src="../assets/brand-lockup.svg" alt="RA Walks Notifier">
  <p class="detail" id="version"></p>
  <p class="detail" id="channel"></p>
  <p class="description">Desktop tray app for monitoring Ramblers Walks Manager review queues.</p>
  <div class="buttons">
    <button id="website">Open Website</button>
    <button class="primary" id="close">Close</button>
  </div>
  <script>
    (async () => {
      const info = await window.about.load();
      document.getElementById('version').textContent = `Version: ${info.version}`;
      document.getElementById('channel').textContent = `Release channel: ${info.channel}`;
    })();

    document.getElementById('website').addEventListener('click', () => window.about.openWebsite());
    document.getElementById('close').addEventListener('click', () => window.close());
  </script>
</body>
</html>
