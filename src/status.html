<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RA Walks Notifier Status</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px 24px 16px;
      color: #1f2933;
      background: #f7f8fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      height: 100vh;
    }

    img.logo {
      width: 170px;
      height: auto;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    #text {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      text-align: left;
      background: white;
      border: 1px solid #e4e7eb;
      border-radius: 8px;
      padding: 12px 14px;
      box-sizing: border-box;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
      flex-shrink: 0;
    }

    button {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #b8c1cc;
      background: white;
      cursor: pointer;
    }

    button.primary {
      background: #1f2933;
      color: white;
      border-color: #1f2933;
    }
  </style>
</head>
<body>
  <img class="logo" src="../assets/brand-lockup.svg" alt="RA Walks Notifier">
  <div id="text">Loading…</div>
  <div class="buttons">
    <button id="log">Open log file</button>
    <button class="primary" id="close">Close</button>
  </div>
  <script>
    (async () => {
      document.getElementById('text').textContent = await window.statusApi.load();
    })();

    document.getElementById('log').addEventListener('click', () => window.statusApi.openLogFile());
    document.getElementById('close').addEventListener('click', () => window.close());
  </script>
</body>
</html>
