<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Notification Recipients</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      color: #1f2933;
      background: #f7f8fa;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    textarea {
      box-sizing: border-box;
      width: 100%;
      height: 170px;
      resize: none;
      border: 1px solid #b8c1cc;
      border-radius: 6px;
      padding: 10px;
      font: 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: white;
    }

    .hint {
      margin: 8px 0 18px;
      color: #52606d;
      font-size: 12px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      border: 1px solid #9aa5b1;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      background: white;
    }

    button.primary {
      border-color: #1264a3;
      background: #1264a3;
      color: white;
    }

    #message {
      min-height: 18px;
      margin-top: 10px;
      font-size: 12px;
      color: #256029;
    }
  </style>
</head>
<body>
  <h1>Notification Recipients</h1>
  <label for="recipients">Email addresses</label>
  <textarea id="recipients" spellcheck="false"></textarea>
  <div class="hint">Enter one address per line, or separate addresses with commas.</div>
  <div class="actions">
    <button id="cancel">Cancel</button>
    <button id="save" class="primary">Save</button>
  </div>
  <div id="message"></div>

  <script>
    const textarea = document.getElementById('recipients');
    const message = document.getElementById('message');

    window.recipients.load().then((recipients) => {
      textarea.value = recipients.join('\n');
    });

    document.getElementById('save').addEventListener('click', async () => {
      const recipients = await window.recipients.save(textarea.value);
      textarea.value = recipients.join('\n');
      message.textContent = `Saved ${recipients.length} recipient${recipients.length === 1 ? '' : 's'}.`;
    });

    document.getElementById('cancel').addEventListener('click', () => {
      window.close();
    });
  </script>
</body>
</html>
