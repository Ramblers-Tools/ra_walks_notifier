<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RA Walks Notifier Logs</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #17212b;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f6f8;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid #d8dee6;
      background: rgba(244, 246, 248, 0.96);
      backdrop-filter: blur(10px);
    }

    img {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .meta {
      margin-left: auto;
      color: #637083;
      font-size: 12px;
    }

    button.close {
      font-family: inherit;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: #f0814f;
      color: white;
      cursor: pointer;
    }

    button.close:hover {
      background: #d96a3a;
    }

    main {
      padding: 14px 18px 20px;
    }

    pre {
      box-sizing: border-box;
      min-height: calc(100vh - 92px);
      margin: 0;
      padding: 14px;
      border: 1px solid #d8dee6;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #ffffff;
      color: #101820;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root, body {
        background: #171b20;
        color: #eef2f6;
      }

      header {
        border-bottom-color: #303843;
        background: rgba(23, 27, 32, 0.96);
      }

      .meta {
        color: #a9b4c2;
      }

      pre {
        border-color: #303843;
        background: #0f1318;
        color: #edf2f7;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="../assets/ramblers-logo.png" alt="">
    <h1>RA Walks Notifier Logs</h1>
    <div class="meta" id="meta">Loading...</div>
    <button class="close" id="close">Close</button>
  </header>
  <main>
    <pre id="log"></pre>
  </main>
  <script>
    const output = document.getElementById('log');
    const meta = document.getElementById('meta');
    let lastText = '';

    async function refresh() {
      const lines = await window.logs.load();
      const text = lines.length ? lines.join('\n') : 'No log entries yet.';
      if (text !== lastText) {
        lastText = text;
        output.textContent = text;
        output.scrollTop = 0;
      }
      meta.textContent = `${lines.length} recent entr${lines.length === 1 ? 'y' : 'ies'}`;
    }

    refresh();
    setInterval(refresh, 1500);

    document.getElementById('close').addEventListener('click', () => window.close());
  </script>
</body>
</html>
