name: Publish GitHub Pages

# Manual only. gh-pages is maintained by hand (uploaded directly to that
# branch) rather than generated from main's index.html - any automatic
# trigger here (whether GitHub's own release event, or another workflow
# calling `gh workflow run pages.yml`) would silently overwrite that
# content, as happened on 2026-07-16 and again on 2026-07-24 via
# release.yml's now-removed auto-dispatch step. Run this manually via
# workflow_dispatch only when main's index.html/assets are meant to
# become the live site.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site
          cp index.html CNAME .nojekyll site/
          cp -R assets site/assets

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
